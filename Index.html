<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Física en Movimiento | Cinemática</title>

  <!-- Bootstrap + Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- CSS propio -->
  <link rel="stylesheet" href="EstiloPresentacion.css" />

  <!-- React + Babel para poder usar JSX en script.js -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body>
  <div class="progress-cosmic" id="progressCosmic"></div>

  <!-- Fondo animado -->
  <div class="universe-bg"></div>
  <div class="stars"></div>
  <div class="nebula one"></div>
  <div class="nebula two"></div>

  <!-- Objetos flotantes -->
  <div class="asteroid a1"></div>
  <div class="asteroid a2"></div>
  <div class="asteroid a3"></div>

  <!-- Aquí React renderiza toda la página -->
  <div id="root"></div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- JS propio con React -->
  <script type="text/babel" src="LogicaPresentacion.js"></script>
</body>
</html>
